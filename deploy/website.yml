---
- name: Deploy website on all hosts
  hosts: all
  vars:
    repo_clone_path: "{{ project_dir }}/website"
    hugo_path: "{{ project_dir }}/website/website"
    static_path: "{{ project_dir }}/website_static"
    main_hostname: "{{ website_hostname }}"
  handlers:
    - import_tasks: telescoop-deploy/handlers/nginx.yml
  tasks:
    - import_tasks: telescoop-deploy/tasks/create-https-certificate.yml
    - import_tasks: telescoop-deploy/tasks/setup-user-and-directories.yml
    - import_tasks: telescoop-deploy/tasks/setup-and-clone-git.yml
      vars:
        clone_path: "{{ repo_clone_path }}"
        repo: "{{ backend_repo }}"
        identity_file_path: "{{ backend_identity_file_path }}"
        git_track_submodules: false
        branch: "{{ website_branch }}"
    - import_tasks: telescoop-deploy/tasks/install-hugo.yml
    - import_tasks: telescoop-deploy/tasks/setup-nginx.yml
      vars:
        nginx_conf_filename: "{{ project_slug }}-website"
        redirect_hostnames: "{{ website_redirect_hostnames }}"
        passwd_dir: "{{ repo_clone_path }}"
    - name: Build website for static rendering
      # yamllint disable-line rule:line-length
      shell: "hugo build {{ hugo_build_flags }}"
      args:
        chdir: "{{ hugo_path }}"
        executable: /bin/bash
      when: clonecode.changed or force_update is defined
      register: build_code

    - name: Update website static folder
      file:
        path: "{{ static_path }}"
        state: "{{ item }}"
        owner: www-data
        mode: "2755"
      with_items:
        - absent
        - directory
      when: clonecode.changed or force_update is defined

    - name: Update website static folder content
      synchronize:
        src: "{{ hugo_path }}/public/"
        dest: "{{ static_path }}/"
        rsync_opts:
          - "-og"
          - "--chown=www-data"
      delegate_to: "{{ inventory_hostname }}"
      when: clonecode.changed or force_update is defined
