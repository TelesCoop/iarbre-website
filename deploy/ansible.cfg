[defaults]
inventory = hosts
interpreter_python = python3
stdout_callback = default
result_format = yaml
force_handlers = True

[connection]
pipelining = True

[ssh_connection]
control_path = %(directory)s/ansible-ssh-%%h-%%p-%%r
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
timeout = 30

[privilege_escalation]
become = true
become_user = root
