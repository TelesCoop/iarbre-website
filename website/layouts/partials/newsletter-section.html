<section class="newsletter-section" id="newsletter">
  <div class="container">
    <div class="newsletter-signup">
      <h2>Restez informé</h2>
      <p>Recevez les dernières actualités du projet IA·rbre</p>
      <form
        action="{{ .Site.Params.newsletter.formUrl }}"
        class="newsletter-form"
        method="post"
      >
        <input
          name="contact[email]"
          placeholder="Votre adresse email"
          required
          type="email"
        />
        <input
          name="captcha"
          type="hidden"
          value="{{ .Site.Params.newsletter.captchaKey }}"
        />
        <button class="btn btn-secondary" type="submit">S'abonner</button>
      </form>
    </div>
  </div>
</section>
